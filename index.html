<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Pokedex</title>
        <link rel="icon" href="assets/icon_192.png" type="image/png" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>The Pokédex</h1>

        <div class="controls">
            <button id="filter-btn">Filter Pokémon</button>
        </div>

        <!-- Filter Modal -->
        <div id="filter-modal" class="modal">
            <div id="filter-modal-content">
                <span id="filter-modal-close-btn" class="close">&times;</span>
                <h2>Apply Filters</h2>
                <div id="filter-modal-options">
                    <label><input class="filter-modal-option" type="checkbox" value="hide_genders">Hide Gender Differences</label>
                    <label><input class="filter-modal-option" type="checkbox" value="hide_forms_without_gender_differences">Hide Forms Without Gender Differences</label>
                    <label><input class="filter-modal-option" type="checkbox" value="hide_region_forms">Hide Region Forms</label>
                    <label><input class="filter-modal-option" type="checkbox" value="hide_mega_forms">Hide Mega Forms</label>
                    <label><input class="filter-modal-option" type="checkbox" value="hide_gigantamax_forms">Hide Gigantamax Forms</label>
                    <label><input class="filter-modal-option" type="checkbox" value="hide_all_forms">Hide All Forms</label>
                    <br/>
                    <label><input class="filter-modal-option" type="checkbox" value="show_shiny_sprites">Show Shiny Sprites</label>
                </div>
            </div>
        </div>

        <div id="pokedex-list"></div>

        <script src="script.js"></script>
    </body>
</html>
